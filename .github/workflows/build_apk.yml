name: 构建 APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      - name: 修复 Gradle Wrapper
        run: |
          cd android
          # 如果 gradle-wrapper.jar 缺失或损坏，重新生成
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ] || [ "$(stat -c%s gradle/wrapper/gradle-wrapper.jar)" -lt 50000 ]; then
            echo "Regenerating Gradle wrapper..."
            rm -f gradle/wrapper/gradle-wrapper.jar gradlew gradlew.bat
            gradle wrapper --gradle-version=8.3
          fi
          ls -la gradle/wrapper/

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Release APK
        run: flutter build apk --release

      - name: 上传 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: email-sync-app-release
          path: build/app/outputs/flutter-apk/app-release.apk